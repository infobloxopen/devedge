version: 2

project_name: devedge

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: de
    main: ./cmd/de
    binary: de
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/infobloxopen/devedge/internal/version.Version={{.Version}}
      - -X github.com/infobloxopen/devedge/internal/version.Commit={{.ShortCommit}}

  - id: devedged
    main: ./cmd/devedged
    binary: devedged
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/infobloxopen/devedge/internal/version.Version={{.Version}}
      - -X github.com/infobloxopen/devedge/internal/version.Commit={{.ShortCommit}}

  - id: devedge-dns-webhook
    main: ./cmd/devedge-dns-webhook
    binary: devedge-dns-webhook
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/infobloxopen/devedge/internal/version.Version={{.Version}}
      - -X github.com/infobloxopen/devedge/internal/version.Commit={{.ShortCommit}}

archives:
  - id: default
    builds:
      - de
      - devedged
      - devedge-dns-webhook
    name_template: "devedge_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: devedge
    repository:
      owner: infobloxopen
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/infobloxopen/devedge
    description: "Local development edge router and name registry"
    hooks:
      post:
        install: |
          if OS.mac?
            %w[de devedged devedge-dns-webhook].each do |bin|
              system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/#{bin}"]
            end
          end
    uninstall_postflight: |
      system_command "#{staged_path}/de", args: ["stop"], print_stderr: false
    caveats: |
      To get started:
        de install    # set up daemon, mkcert CA, DNS
        de start      # start the background daemon
        de doctor     # verify everything is healthy

      The binaries are not signed by Apple. The post-install hook clears
      the quarantine flag automatically. If macOS still blocks them, run:
        xattr -dr com.apple.quarantine $(brew --caskroom)/devedge

release:
  github:
    owner: infobloxopen
    name: devedge
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}}-v{{.Version}}"
