apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devedge-postgres.fullname" . }}
  labels:
    {{- include "devedge-postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "devedge-postgres.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "devedge-postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devedge-postgres.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: POSTGRES_PASSWORD
              value: {{ .Values.auth.postgresPassword | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.storage.size }}
