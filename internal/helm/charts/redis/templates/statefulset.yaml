apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devedge-redis.fullname" . }}
  labels:
    {{- include "devedge-redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "devedge-redis.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "devedge-redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devedge-redis.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- if .Values.auth.enabled }}
          command:
            - redis-server
            - --requirepass
            - {{ .Values.auth.password | quote }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.storage.size }}
