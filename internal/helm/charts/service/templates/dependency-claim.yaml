{{- /*
  Abstract dependency claims, kept SEPARATE from the service Deployment so a
  future app-owned workload chart can consume just this piece (plan decision 7).
  A claim is environment-agnostic: in dev devedge binds it to the shared
  instance's logical database; in a real cluster the org DB abstraction
  provisions a dedicated instance. The connection is delivered via the
  per-dependency DSN Secret which devedge populates with the in-cluster connection.

  Rendered by default (the abstract artifact `de project chart` emits). The dev
  deploy path (005) sets `service.noDependencyClaims=true` to skip it: there is no
  DependencyClaim CRD/controller in a local dev cluster, and devedge already writes
  the in-cluster DSN Secret directly, so the claim is unnecessary there.
*/ -}}
{{- if not .Values.service.noDependencyClaims }}
{{- range .Values.dependencies }}
---
apiVersion: devedge.infoblox.dev/v1alpha1
kind: DependencyClaim
metadata:
  name: {{ include "service.name" $ }}-{{ .name }}
  labels:
    {{- include "service.labels" $ | nindent 4 }}
spec:
  engine: {{ .engine }}
  version: {{ .version | default "" | quote }}
  envVar: {{ .envVar }}
  secretName: {{ include "service.name" $ }}-{{ .name }}-dsn
{{- end }}
{{- end }}
