{{- /*
  Per-dependency DSN Secret, kept SEPARATE from the Deployment (BYO-chart seam).
  Holds the real DSN, injected at deploy time (dev: by devedge; prod: by the DB
  abstraction). The app's env var is an indirect hotload DSN that points at this
  value mounted as a file, so the same connection convention holds in dev and prod.
*/ -}}
{{- range .Values.dependencies }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "service.name" $ }}-{{ .name }}-dsn
  labels:
    {{- include "service.labels" $ | nindent 4 }}
type: Opaque
stringData:
  dsn: ""
{{- end }}
